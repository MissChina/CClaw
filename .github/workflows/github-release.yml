name: GitHub Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional override release version; defaults to package.json version"
        required: false
      force:
        description: "Force refresh the GitHub Release even if it already exists"
        required: false
        type: boolean
        default: false

concurrency:
  group: github-release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24.x"
  PNPM_VERSION: "10.23.0"

jobs:
  build_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Resolve release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          requested_version="${{ inputs.version }}"
          if [[ -n "$requested_version" ]]; then
            version="$requested_version"
          else
            version="$package_version"
          fi
          if [[ "$package_version" != "$version" ]]; then
            echo "::error::package.json version ${package_version} does not match requested release version ${version}"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.vars.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to publish
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ steps.release_state.outputs.exists }}" == "true" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate auto release
        if: steps.gate.outputs.should_publish != 'true'
        shell: bash
        run: |
          echo "Release ${{ steps.vars.outputs.tag }} already exists; skipping build and publish."

      - name: Validate release metadata
        if: steps.gate.outputs.should_publish == 'true'
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          RELEASE_MAIN_REF: origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          pnpm release:openclaw:npm:check

      - name: Check
        if: steps.gate.outputs.should_publish == 'true'
        run: pnpm check

      - name: Build
        if: steps.gate.outputs.should_publish == 'true'
        run: pnpm build

      - name: Verify release contents
        if: steps.gate.outputs.should_publish == 'true'
        run: pnpm release:check

      - name: Pack npm release artifact
        if: steps.gate.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/release-assets
          npm pack --pack-destination .artifacts/release-assets

      - name: Generate checksums
        if: steps.gate.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd .artifacts/release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Generate release notes and metadata
        if: steps.gate.outputs.should_publish == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          node --import tsx scripts/generate-release-files.ts \
            --version "${{ steps.vars.outputs.version }}" \
            --tag "${{ steps.vars.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --artifacts-dir .artifacts/release-assets \
            --output-dir .artifacts/release

      - name: Publish GitHub release with gh
        if: steps.gate.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.vars.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target "${GITHUB_SHA}" \
            --title "OpenClaw ${{ steps.vars.outputs.version }}" \
            --notes-file .artifacts/release/release-body.md \
            .artifacts/release-assets/* \
            .artifacts/release/release-notes.en.md \
            .artifacts/release/release-notes.zh-CN.md \
            .artifacts/release/release-metadata.json
