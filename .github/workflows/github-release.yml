name: GitHub Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional override release version; defaults to package.json version"
        required: false
      force:
        description: "Force release even if tag/release already exists"
        required: false
        type: boolean
        default: false

concurrency:
  group: github-release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24.x"
  PNPM_VERSION: "10.23.0"

jobs:
  build_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install-bun: "false"
          use-sticky-disk: "false"

      - name: Resolve release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          requested_version="${{ inputs.version }}"
          if [[ -n "$requested_version" ]]; then
            version="$requested_version"
          else
            version="$package_version"
          fi
          if [[ "$package_version" != "$version" ]]; then
            echo "::error::package.json version ${package_version} does not match requested release version ${version}"
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_state
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.vars.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release already exists
        id: release_state
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ steps.vars.outputs.tag }}`;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
                return;
              }
              throw error;
            }

      - name: Skip duplicate auto release
        if: github.event_name == 'push' && steps.tag_state.outputs.exists == 'true' && steps.release_state.outputs.exists == 'true'
        shell: bash
        run: |
          echo "Tag and release already exist for ${{ steps.vars.outputs.tag }}; skipping duplicate auto release."
          exit 0

      - name: Create and push release tag
        if: steps.tag_state.outputs.exists != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force)
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            git tag -d "$tag"
          fi
          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag" --force

      - name: Validate release tag and package metadata
        env:
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          RELEASE_MAIN_REF: origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          pnpm release:openclaw:npm:check

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Verify release contents
        run: pnpm release:check

      - name: Pack npm release artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/release-assets
          npm pack --pack-destination .artifacts/release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd .artifacts/release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Generate release notes and metadata
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          node --import tsx scripts/generate-release-files.ts \
            --version "${{ steps.vars.outputs.version }}" \
            --tag "${{ steps.vars.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --artifacts-dir .artifacts/release-assets \
            --output-dir .artifacts/release

      - name: Publish GitHub release
        if: steps.release_state.outputs.exists != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: OpenClaw ${{ steps.vars.outputs.version }}
          body_path: .artifacts/release/release-body.md
          fail_on_unmatched_files: true
          files: |
            .artifacts/release-assets/*
            .artifacts/release/release-notes.en.md
            .artifacts/release/release-notes.zh-CN.md
            .artifacts/release/release-metadata.json
